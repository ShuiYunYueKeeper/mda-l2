<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:;" />
  <title>MDA</title>
  <style>
    /* ================= 主题变量 ================= */
    :root {
      --bg: #ffffff;
      --bg-secondary: #fafafa;
      --bg-tertiary: #f6f8fa;
      --text: #24292f;
      --text-muted: #6a737d;
      --border: #d0d7de;
      --border-light: #eaecef;
      --accent: #1a73e8;
      --link: #0969da;
      --code-bg: #f6f8fa;
      --gutter-bg: #eef1f4;
      --gutter-text: #9aa0a6;
      --menu-bg: #ffffff;
      --table-alt: #f6f8fa;
      --img-alt-border: #ccc;
      --danger: #e74c3c;
      --tag-bg: #e8e8e8;
      --sel-bg: #e8f0fe;
    }
    [data-theme="dark"] {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #161b22;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --border: #30363d;
      --border-light: #21262d;
      --accent: #388bfd;
      --link: #58a6ff;
      --code-bg: #161b22;
      --gutter-bg: #0d1117;
      --gutter-text: #6e7681;
      --menu-bg: #161b22;
      --table-alt: #161b22;
      --img-alt-border: #30363d;
      --danger: #f85149;
      --tag-bg: #30363d;
      --sel-bg: #1f2a3d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }
    #root { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

    /* ================= 顶部工具栏 ================= */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
    }
    .tool-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
    }
    .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tool-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .tool-btn:disabled { opacity: .45; cursor: not-allowed; }
    .tool-btn:disabled:hover { color: var(--text); border-color: var(--border); }
    .toolbar .spacer { flex: 1; }
    .toolbar .file-name { font-size: 12px; color: var(--text-muted); max-width: 40%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dirty-dot { color: var(--danger); font-weight: bold; margin-left: 2px; }

    /* ================= 主体三栏（编辑 | 预览 | 批注，宽度可拖拽）================= */
    #content-row { display: flex; flex: 1 1 auto; overflow: hidden; }
    #editor-pane { flex: 0 0 380px; display: none; overflow: hidden; }
    #editor-pane.visible { display: flex; }
    #preview-pane { flex: 1 1 auto; min-width: 200px; overflow: auto; padding: 16px; background: var(--bg); }
    #preview-content { max-width: 800px; margin: 0 auto; line-height: 1.7; }
    #panel-pane { flex: 0 0 320px; display: flex; flex-direction: column; overflow: hidden; min-width: 240px; background: var(--bg-secondary); }
    #panel-pane.hidden { display: none; }

    /* 分栏拖拽手柄 */
    .mda-splitter { flex: 0 0 5px; cursor: col-resize; background: var(--border-light); }
    .mda-splitter:hover { background: var(--accent); }
    .mda-splitter.hidden { display: none; }

    /* ================= 源码编辑器（textarea 叠加高亮层 + 行号槽）================= */
    .mda-src-editor { flex: 1; display: flex; overflow: hidden; background: var(--bg); border-right: 1px solid var(--border); }
    .src-gutter {
      flex: 0 0 auto; width: 3.4em; padding: 12px 8px 12px 0; text-align: right;
      color: var(--gutter-text); background: var(--gutter-bg); border-right: 1px solid var(--border);
      font-family: 'Cascadia Code', Consolas, 'Courier New', 'Microsoft YaHei', monospace; font-size: 13px; line-height: 21px;
      white-space: pre; overflow: hidden; user-select: none; -webkit-user-select: none;
      font-variant-ligatures: none; font-feature-settings: "liga" 0, "calt" 0;
    }
    .src-scroll { position: relative; flex: 1; overflow: hidden; }
    .src-highlight, .src-input {
      margin: 0; border: 0; padding: 12px;
      /* 显式指定中文回退字体：textarea 与高亮层若各自挑不同 CJK 回退字体，每个汉字差一点点、
         几个字后光标就明显偏移（点行首正常、点行尾偏）。两层锁定同一中文字体即可对齐。 */
      /* 行高必须用整数像素：1.6*13=20.8px 非整数，textarea 与 <code> 逐行取整方式不同，
         滚到几百行会累积成几十像素的纵向错位（越往下越乱）。整数 px 使两层每行严格等高。 */
      font-family: 'Cascadia Code', Consolas, 'Courier New', 'Microsoft YaHei', monospace; font-size: 13px; line-height: 21px;
      white-space: pre; tab-size: 2; word-wrap: normal; letter-spacing: 0;
      /* 关闭连字：整行被拆成多个 span 后，跨 span 的连字会在高亮层断开而 textarea 不断开，
         两层字符宽度不一致导致光标错位。两层必须一致关闭。 */
      font-variant-ligatures: none; font-feature-settings: "liga" 0, "calt" 0;
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-sizing: border-box;
    }
    .src-highlight { pointer-events: none; z-index: 1; color: var(--text); background: transparent; overflow: hidden; }
    /* textarea 因横向滚动条(~17px)+末行预留，可滚动范围恒比高亮层多几十像素，滚到底部时高亮层被钳住→纵向错位。
       给高亮层加足够的底/右内边距，使其可滚动范围 ≥ textarea，同步时不再被钳住（padding 是末行之后的空白，不影响字符位置）。 */
    .src-highlight { padding-bottom: 60px; padding-right: 60px; }
    .src-highlight code { font: inherit; white-space: pre; display: block; background: transparent; padding: 0; }
    /* 围栏内 hljs 默认主题会加真实 font-weight/font-style → 改字宽导致光标错位；
       在高亮层统一归一为常规，字宽完全由 textarea 决定，再由下方 mda-hl 类按需覆盖颜色/斜体/模拟加粗。 */
    .src-highlight code, .src-highlight code * { font-weight: normal; font-style: normal; }
    /* 编辑器 Markdown 高亮：颜色 + 样式。
       加粗禁用真实 font-weight（会改变字宽 → textarea 光标错位），改用 text-shadow 横向描边模拟加粗，
       布局中性；斜体的 font-style 不改字宽，可保留。 */
    .src-highlight .mda-hl-mark { color: var(--gutter-text); }
    .src-highlight .mda-hl-heading { color: #6f42c1; text-shadow: 0.4px 0 0 currentColor; }
    .src-highlight .mda-hl-quote { color: var(--text-muted); font-style: italic; }
    .src-highlight .mda-hl-code { color: #032f62; }
    .src-highlight .mda-hl-strong { color: #0550ae; text-shadow: 0.4px 0 0 currentColor; }
    .src-highlight .mda-hl-link { color: #0969da; }
    [data-theme="dark"] .src-highlight .mda-hl-heading { color: #d2a8ff; }
    [data-theme="dark"] .src-highlight .mda-hl-code { color: #a5d6ff; }
    [data-theme="dark"] .src-highlight .mda-hl-strong { color: #79c0ff; }
    [data-theme="dark"] .src-highlight .mda-hl-link { color: #58a6ff; }
    .src-input {
      z-index: 2; resize: none; overflow: auto; background: transparent; color: transparent;
      caret-color: var(--text); outline: none;
    }
    .src-input::selection { background: rgba(56,139,253,0.35); }

    /* ================= 缩放遮罩（图片 / 流程图）================= */
    .mda-zoom {
      position: fixed; inset: 0; z-index: 4000; background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .mda-zoom-stage { transform-origin: center center; cursor: grab; }
    .mda-zoom-stage:active { cursor: grabbing; }
    .mda-zoom-stage img, .mda-zoom-stage svg { max-width: 90vw; max-height: 90vh; display: block; background: #fff; border-radius: 4px; }
    .mda-zoom-bar { position: fixed; top: 14px; right: 16px; display: flex; gap: 6px; z-index: 4002; }
    .mda-zoom-bar button {
      width: 34px; height: 34px; font-size: 18px; line-height: 1; cursor: pointer;
      color: #fff; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.45); border-radius: 6px;
    }
    .mda-zoom-bar button:hover { background: rgba(0,0,0,0.82); border-color: #fff; }
    #preview-content img { cursor: zoom-in; }
    .mda-mermaid { cursor: zoom-in; }

    .md-image-alt { display: inline-block; padding: 4px 8px; border: 1px dashed var(--img-alt-border); color: var(--text-muted); font-style: italic; font-size: 0.9em; border-radius: 4px; }
    [data-line] { cursor: pointer; }
    .mda-cursor-block { background: color-mix(in srgb, var(--accent) 12%, transparent); box-shadow: -4px 0 0 var(--accent); border-radius: 2px; }

    /* ================= Markdown 正文排版 ================= */
    #preview-content { color: var(--text); font-size: 16px; word-wrap: break-word; }
    #preview-content h1, #preview-content h2, #preview-content h3,
    #preview-content h4, #preview-content h5, #preview-content h6 {
      margin: 24px 0 16px; font-weight: 600; line-height: 1.25;
    }
    #preview-content h1:first-child,
    #preview-content h2:first-child,
    #preview-content h3:first-child { margin-top: 0; }
    #preview-content h1 { font-size: 1.9em; padding-bottom: .3em; border-bottom: 1px solid var(--border-light); }
    #preview-content h2 { font-size: 1.5em; padding-bottom: .3em; border-bottom: 1px solid var(--border-light); }
    #preview-content h3 { font-size: 1.25em; }
    #preview-content h4 { font-size: 1em; }
    #preview-content h5 { font-size: .9em; }
    #preview-content h6 { font-size: .85em; color: var(--text-muted); }
    #preview-content p { margin: 0 0 16px; }
    #preview-content ul, #preview-content ol { margin: 0 0 16px; padding-left: 2em; }
    #preview-content li { margin: .25em 0; }
    #preview-content li > ul, #preview-content li > ol { margin: .25em 0; }
    #preview-content blockquote {
      margin: 0 0 16px; padding: 0 1em; color: var(--text-muted);
      border-left: .25em solid var(--border);
    }
    #preview-content blockquote > :last-child { margin-bottom: 0; }
    #preview-content hr { height: 1px; margin: 24px 0; background: var(--border-light); border: 0; }
    #preview-content a { color: var(--link); text-decoration: none; }
    #preview-content a:hover { text-decoration: underline; }
    #preview-content strong { font-weight: 600; }
    #preview-content img { max-width: 100%; }
    #preview-content table {
      display: block; width: max-content; max-width: 100%; margin: 0 0 16px;
      overflow: auto; border-collapse: collapse;
    }
    #preview-content table th, #preview-content table td { padding: 6px 13px; border: 1px solid var(--border); }
    #preview-content table th { font-weight: 600; background: var(--bg-tertiary); }
    #preview-content table tr:nth-child(2n) td { background: var(--table-alt); }

    /* ================= 流程图 (mermaid) ================= */
    .mda-mermaid { margin: 12px 0; text-align: center; overflow-x: auto; }
    .mda-mermaid svg { max-width: 100%; height: auto; }
    .mda-mermaid-error {
      margin: 12px 0; padding: 10px 12px; border: 1px solid var(--danger);
      border-radius: 6px; color: var(--danger); background: color-mix(in srgb, var(--danger) 8%, transparent);
      font-size: 13px; white-space: pre-wrap;
    }

    /* ================= 代码块增强 ================= */
    .mda-code {
      position: relative; margin: 12px 0; border: 1px solid var(--border);
      border-radius: 6px; background: var(--code-bg); overflow: hidden; outline: none;
    }
    .mda-code:focus-within { box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 40%, transparent); }
    .mda-code-copy {
      position: absolute; top: 6px; right: 6px; z-index: 2; padding: 3px 10px;
      font-size: 12px; cursor: pointer; color: var(--text); background: var(--bg);
      border: 1px solid var(--border); border-radius: 4px; opacity: 0; transition: opacity .12s;
    }
    .mda-code:hover .mda-code-copy, .mda-code:focus-within .mda-code-copy { opacity: 1; }
    .mda-code-copy:hover { border-color: var(--accent); color: var(--accent); }
    .mda-code .mda-code-gutter {
      position: absolute; left: 0; top: 0; bottom: 0; width: 3.2em; padding: 12px 8px 12px 0;
      text-align: right; white-space: pre; user-select: none; -webkit-user-select: none;
      color: var(--gutter-text); background: var(--gutter-bg); border-right: 1px solid var(--border);
      font-family: 'Cascadia Code', Consolas, 'Courier New', monospace; font-size: 13px; line-height: 1.5;
      pointer-events: none;
    }
    .mda-code .mda-code-scroll { margin-left: 3.2em; overflow-x: auto; }
    .mda-code pre.mda-code-pre { margin: 0; padding: 12px; background: transparent; border: none; }
    .mda-code pre.mda-code-pre code {
      display: block; white-space: pre; color: var(--text);
      font-family: 'Cascadia Code', Consolas, 'Courier New', monospace;
      font-size: 13px; line-height: 1.5; background: transparent; padding: 0;
    }
    code { font-family: 'Cascadia Code', Consolas, 'Courier New', monospace; background: var(--bg-tertiary); padding: 1px 4px; border-radius: 3px; font-size: 0.92em; }
    pre code { background: transparent; padding: 0; }

    /* ================= 右键菜单 ================= */
    .mda-context-menu {
      position: fixed; z-index: 3000; min-width: 120px; background: var(--menu-bg);
      border: 1px solid var(--border); border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      padding: 4px 0; font-size: 13px;
    }
    .mda-context-menu .mda-menu-item {
      display: flex; align-items: center; justify-content: space-between; gap: 24px;
      padding: 7px 16px; cursor: pointer; color: var(--text);
    }
    .mda-context-menu .mda-menu-item:hover { background: var(--accent); color: #fff; }
    .mda-context-menu .mda-menu-key { color: var(--text-muted); font-size: 12px; }
    .mda-context-menu .mda-menu-item:hover .mda-menu-key { color: #e0e8ff; }

    /* ================= 批注面板 ================= */
    .panel-head { padding: 8px; border-bottom: 1px solid var(--border); background: var(--bg); }
    .btn-primary {
      width: 100%; padding: 8px; cursor: pointer; background: var(--accent); color: #fff;
      border: none; border-radius: 4px; font-size: 14px;
    }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .filter-box { padding: 8px; border-bottom: 1px solid var(--border-light); font-size: 12px; background: var(--bg); }
    .filter-box b { color: var(--text); }
    .filter-box label { color: var(--text); }
    #anno-list { flex: 1; overflow: auto; }
    .anno-item { padding: 10px 8px; border-bottom: 1px solid var(--border-light); cursor: pointer; background: var(--bg); }
    .anno-item:nth-child(2n) { background: var(--bg-secondary); }
    .anno-item.selected { background: var(--sel-bg); }
    .anno-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .anno-content { margin-bottom: 6px; font-size: 13px; color: var(--text); }
    .anno-tags { margin-bottom: 6px; }
    .anno-tag { background: var(--tag-bg); border-radius: 3px; padding: 2px 6px; font-size: 11px; margin-right: 4px; color: var(--text); }
    .anno-actions { text-align: right; }
    .btn-mini { font-size: 11px; padding: 3px 8px; cursor: pointer; border: 1px solid var(--border); border-radius: 3px; background: var(--bg); color: var(--text); margin-right: 4px; }
    .btn-mini.danger { border-color: var(--danger); color: var(--danger); }
    .anno-empty { padding: 24px; color: var(--text-muted); text-align: center; font-size: 13px; }

    /* ================= 弹窗 ================= */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); display: flex; justify-content: center; align-items: center; z-index: 2000; }
    .modal-box { background: var(--bg); color: var(--text); border-radius: 8px; padding: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.35); }
    .modal-box h3 { margin: 0 0 16px; font-size: 16px; }
    .modal-box label { font-size: 12px; color: var(--text-muted); }
    .modal-box input, .modal-box textarea, .modal-box select {
      width: 100%; padding: 8px; margin-top: 4px; border: 1px solid var(--border);
      border-radius: 4px; background: var(--bg); color: var(--text); font-size: 13px;
    }
    .modal-box textarea { resize: vertical; }
    .modal-field { margin-bottom: 12px; }
    .modal-actions { text-align: right; margin-top: 16px; }
    .btn-ghost { padding: 8px 20px; margin-right: 8px; cursor: pointer; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); font-size: 13px; }
    .btn-ok { padding: 8px 20px; cursor: pointer; background: var(--accent); color: #fff; border: none; border-radius: 4px; font-size: 13px; }

    /* ================= highlight.js 主题（亮/暗） ================= */
    .hljs-comment, .hljs-quote { color: #6a737d; font-style: italic; }
    .hljs-keyword, .hljs-selector-tag, .hljs-built_in, .hljs-name, .hljs-tag { color: #d73a49; }
    .hljs-string, .hljs-doctag, .hljs-template-tag, .hljs-template-variable, .hljs-regexp, .hljs-addition { color: #032f62; }
    .hljs-title, .hljs-title.class_, .hljs-title.function_, .hljs-section, .hljs-selector-id { color: #6f42c1; }
    .hljs-number, .hljs-literal, .hljs-variable, .hljs-attr, .hljs-attribute, .hljs-meta { color: #005cc5; }
    .hljs-type, .hljs-class .hljs-title, .hljs-symbol, .hljs-bullet, .hljs-link { color: #e36209; }
    .hljs-emphasis { font-style: italic; }
    .hljs-strong { font-weight: bold; }
    .hljs-deletion { color: #b31d28; background: #ffeef0; }

    [data-theme="dark"] .hljs-comment, [data-theme="dark"] .hljs-quote { color: #8b949e; }
    [data-theme="dark"] .hljs-keyword, [data-theme="dark"] .hljs-selector-tag, [data-theme="dark"] .hljs-built_in, [data-theme="dark"] .hljs-name, [data-theme="dark"] .hljs-tag { color: #ff7b72; }
    [data-theme="dark"] .hljs-string, [data-theme="dark"] .hljs-doctag, [data-theme="dark"] .hljs-template-tag, [data-theme="dark"] .hljs-template-variable, [data-theme="dark"] .hljs-regexp, [data-theme="dark"] .hljs-addition { color: #a5d6ff; }
    [data-theme="dark"] .hljs-title, [data-theme="dark"] .hljs-title.class_, [data-theme="dark"] .hljs-title.function_, [data-theme="dark"] .hljs-section, [data-theme="dark"] .hljs-selector-id { color: #d2a8ff; }
    [data-theme="dark"] .hljs-number, [data-theme="dark"] .hljs-literal, [data-theme="dark"] .hljs-variable, [data-theme="dark"] .hljs-attr, [data-theme="dark"] .hljs-attribute, [data-theme="dark"] .hljs-meta { color: #79c0ff; }
    [data-theme="dark"] .hljs-type, [data-theme="dark"] .hljs-class .hljs-title, [data-theme="dark"] .hljs-symbol, [data-theme="dark"] .hljs-bullet, [data-theme="dark"] .hljs-link { color: #ffa657; }
    [data-theme="dark"] .hljs-deletion { color: #ffdcd7; background: #67060c; }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- mermaid 离线 UMD（copy-gui 从 node_modules 拷贝） -->
  <script src="./mermaid.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
