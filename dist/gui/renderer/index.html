<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:;" />
  <title>MDA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
    #root { display: flex; height: 100vh; width: 100vw; }
    .md-image-alt { display: inline-block; padding: 4px 8px; border: 1px dashed #ccc; color: #999; font-style: italic; font-size: 0.9em; border-radius: 4px; }
    [data-line] { cursor: pointer; }
    .mda-cursor-block { background: #fff8e1; box-shadow: -4px 0 0 #1a73e8; border-radius: 2px; }

    /* ---- Markdown 正文排版（GitHub 风格）---- */
    #preview-content {
      color: #24292f;
      font-size: 16px;
      word-wrap: break-word;
    }
    #preview-content h1,
    #preview-content h2,
    #preview-content h3,
    #preview-content h4,
    #preview-content h5,
    #preview-content h6 {
      margin: 24px 0 16px;
      font-weight: 600;
      line-height: 1.25;
    }
    #preview-content h1:first-child,
    #preview-content h2:first-child,
    #preview-content h3:first-child { margin-top: 0; }
    #preview-content h1 { font-size: 1.9em; padding-bottom: .3em; border-bottom: 1px solid #eaecef; }
    #preview-content h2 { font-size: 1.5em; padding-bottom: .3em; border-bottom: 1px solid #eaecef; }
    #preview-content h3 { font-size: 1.25em; }
    #preview-content h4 { font-size: 1em; }
    #preview-content h5 { font-size: .9em; }
    #preview-content h6 { font-size: .85em; color: #6a737d; }
    #preview-content p { margin: 0 0 16px; }
    #preview-content ul,
    #preview-content ol { margin: 0 0 16px; padding-left: 2em; }
    #preview-content li { margin: .25em 0; }
    #preview-content li > ul,
    #preview-content li > ol { margin: .25em 0; }
    #preview-content blockquote {
      margin: 0 0 16px;
      padding: 0 1em;
      color: #6a737d;
      border-left: .25em solid #dfe2e5;
    }
    #preview-content blockquote > :last-child { margin-bottom: 0; }
    #preview-content hr { height: 1px; margin: 24px 0; background: #e1e4e8; border: 0; }
    #preview-content a { color: #0969da; text-decoration: none; }
    #preview-content a:hover { text-decoration: underline; }
    #preview-content strong { font-weight: 600; }
    #preview-content img { max-width: 100%; }
    #preview-content table {
      display: block;
      width: max-content;
      max-width: 100%;
      margin: 0 0 16px;
      overflow: auto;
      border-collapse: collapse;
    }
    #preview-content table th,
    #preview-content table td {
      padding: 6px 13px;
      border: 1px solid #d0d7de;
    }
    #preview-content table th { font-weight: 600; background: #f6f8fa; }
    #preview-content table tr:nth-child(2n) td { background: #f6f8fa; }

    /* ---- 代码块增强 ---- */
    .mda-code {
      position: relative;
      margin: 12px 0;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      background: #f6f8fa;
      overflow: hidden;
      outline: none;
    }
    .mda-code:focus-within { box-shadow: 0 0 0 2px rgba(26,115,232,0.35); }
    .mda-code-copy {
      position: absolute;
      top: 6px;
      right: 6px;
      z-index: 2;
      padding: 3px 10px;
      font-size: 12px;
      cursor: pointer;
      color: #444;
      background: rgba(255,255,255,0.9);
      border: 1px solid #d0d7de;
      border-radius: 4px;
      opacity: 0;
      transition: opacity .12s;
    }
    .mda-code:hover .mda-code-copy,
    .mda-code:focus-within .mda-code-copy { opacity: 1; }
    .mda-code-copy:hover { background: #fff; border-color: #1a73e8; color: #1a73e8; }
    .mda-code .mda-code-gutter {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3.2em;
      padding: 12px 8px 12px 0;
      text-align: right;
      white-space: pre;
      user-select: none;
      -webkit-user-select: none;
      color: #9aa0a6;
      background: #eef1f4;
      border-right: 1px solid #e1e4e8;
      font-family: 'Cascadia Code', Consolas, 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      pointer-events: none;
    }
    .mda-code .mda-code-scroll {
      margin-left: 3.2em;
      overflow-x: auto;
    }
    .mda-code pre.mda-code-pre {
      margin: 0;
      padding: 12px;
      background: transparent;
      border: none;
    }
    .mda-code pre.mda-code-pre code {
      display: block;
      white-space: pre;
      font-family: 'Cascadia Code', Consolas, 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      background: transparent;
      padding: 0;
    }
    /* 行内代码与普通 pre（无 mda-code 包裹的情况）兜底 */
    code { font-family: 'Cascadia Code', Consolas, 'Courier New', monospace; background: #f0f1f2; padding: 1px 4px; border-radius: 3px; font-size: 0.92em; }
    pre code { background: transparent; padding: 0; }

    /* ---- 右键菜单 ---- */
    .mda-context-menu {
      position: fixed;
      z-index: 3000;
      min-width: 120px;
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      padding: 4px 0;
      font-size: 13px;
    }
    .mda-context-menu .mda-menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 7px 16px;
      cursor: pointer;
    }
    .mda-context-menu .mda-menu-item:hover { background: #1a73e8; color: #fff; }
    .mda-context-menu .mda-menu-key { color: #999; font-size: 12px; }
    .mda-context-menu .mda-menu-item:hover .mda-menu-key { color: #e0e8ff; }

    /* ---- highlight.js 精简主题（GitHub Light）---- */
    .hljs-comment, .hljs-quote { color: #6a737d; font-style: italic; }
    .hljs-keyword, .hljs-selector-tag, .hljs-built_in, .hljs-name, .hljs-tag { color: #d73a49; }
    .hljs-string, .hljs-doctag, .hljs-template-tag, .hljs-template-variable, .hljs-regexp, .hljs-addition { color: #032f62; }
    .hljs-title, .hljs-title.class_, .hljs-title.function_, .hljs-section, .hljs-selector-id { color: #6f42c1; }
    .hljs-number, .hljs-literal, .hljs-variable, .hljs-attr, .hljs-attribute, .hljs-meta { color: #005cc5; }
    .hljs-type, .hljs-class .hljs-title, .hljs-symbol, .hljs-bullet, .hljs-link { color: #e36209; }
    .hljs-emphasis { font-style: italic; }
    .hljs-strong { font-weight: bold; }
    .hljs-deletion { color: #b31d28; background: #ffeef0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="./app.js"></script>
</body>
</html>
