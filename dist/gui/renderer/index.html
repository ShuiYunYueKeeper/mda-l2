<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:;" />
  <title>MDA</title>
  <link rel="stylesheet" href="./katex.min.css" />
  <style>
    /* ================= 主题变量 ================= */
    :root {
      --bg: #ffffff;
      --bg-secondary: #fafafa;
      --bg-tertiary: #f6f8fa;
      --text: #24292f;
      --text-muted: #6a737d;
      --border: #d0d7de;
      --border-light: #eaecef;
      --accent: #1a73e8;
      --link: #0969da;
      --code-bg: #f6f8fa;
      --gutter-bg: #eef1f4;
      --gutter-text: #9aa0a6;
      --menu-bg: #ffffff;
      --table-alt: #f6f8fa;
      --img-alt-border: #ccc;
      --danger: #e74c3c;
      --tag-bg: #e8e8e8;
      --sel-bg: #e8f0fe;
    }
    [data-theme="dark"] {
      --bg: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #161b22;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --border: #30363d;
      --border-light: #21262d;
      --accent: #388bfd;
      --link: #58a6ff;
      --code-bg: #161b22;
      --gutter-bg: #0d1117;
      --gutter-text: #6e7681;
      --menu-bg: #161b22;
      --table-alt: #161b22;
      --img-alt-border: #30363d;
      --danger: #f85149;
      --tag-bg: #30363d;
      --sel-bg: #1f2a3d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }
    #root { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

    /* ================= 顶部工具栏 ================= */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex: 0 0 auto;
    }
    .tool-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
    }
    .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tool-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .tool-btn:disabled { opacity: .45; cursor: not-allowed; }
    .tool-btn:disabled:hover { color: var(--text); border-color: var(--border); }
    .toolbar .spacer { flex: 1; }
    .toolbar .file-name {
      font-size: 12px;
      color: var(--text-muted);
      max-width: 40%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      user-select: text;
      -webkit-user-select: text;
      cursor: text;
    }
    .toolbar .file-name .dirty-dot { user-select: none; -webkit-user-select: none; }
    .dirty-dot { color: var(--danger); font-weight: bold; margin-left: 2px; }

    /* ================= 主体三栏（编辑 | 预览 | 批注，宽度可拖拽）================= */
    #content-row { display: flex; flex: 1 1 auto; overflow: hidden; position: relative; }
    #content-row.welcome-mode #preview-pane,
    #content-row.welcome-mode #panel-pane,
    #content-row.welcome-mode #editor-pane,
    #content-row.welcome-mode .mda-splitter { visibility: hidden; }

    /* ================= 左侧文件列表 ================= */
    #file-sidebar-root { position: relative; display: flex; flex: 1; min-height: 0; overflow: hidden; }
    .mda-left-rail {
      flex: 0 0 220px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-secondary);
      transition: flex-basis .15s ease;
    }
    .mda-left-rail.collapsed { flex: 0 0 28px; }
    .mda-left-rail.hidden { display: none; }
    .mda-left-rail.collapsed .mda-file-sidebar { display: none; }
    .mda-fs-expand-tab {
      display: none;
      position: absolute; inset: 0;
      align-items: center; justify-content: center;
      width: 100%; border: none; padding: 0;
      background: var(--bg-secondary);
      color: var(--text-muted); font-size: 16px; line-height: 1;
      cursor: pointer;
    }
    .mda-fs-expand-tab:hover { color: var(--accent); background: var(--bg-tertiary); }
    .mda-left-rail.collapsed .mda-fs-expand-tab { display: flex; }
    .mda-file-sidebar { display: flex; flex-direction: column; height: 100%; flex: 1; overflow: hidden; }
    .mda-file-sidebar-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; font-size: 12px; font-weight: 600;
      border-bottom: 1px solid var(--border-light); color: var(--text-muted);
      flex: 0 0 auto;
    }
    .mda-file-sidebar-actions { display: flex; align-items: center; gap: 2px; }
    .mda-file-sidebar-icon {
      border: none; background: transparent; cursor: pointer; color: var(--text-muted);
      font-size: 14px; padding: 2px 6px; border-radius: 4px; line-height: 1;
    }
    .mda-file-sidebar-icon:hover { color: var(--accent); background: var(--bg-tertiary); }
    .mda-file-tree { flex: 1; overflow: auto; padding: 6px 0; font-size: 12px; outline: none; }
    .mda-file-tree:focus { box-shadow: inset 0 0 0 1px var(--accent); }
    .mda-fs-row {
      display: flex; align-items: center; gap: 4px; padding: 4px 8px 4px 4px;
      cursor: pointer; user-select: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mda-fs-row:hover { background: var(--sel-bg); }
    .mda-fs-row.active { background: var(--sel-bg); color: var(--accent); font-weight: 600; }
    .mda-fs-row.file[draggable="true"] { cursor: grab; }
    .mda-fs-row.cut-pending { opacity: 0.45; }
    .mda-fs-row.dragging { opacity: 0.55; }
    .mda-fs-row.drop-target {
      outline: 1px solid var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
    }
    .mda-fs-row.dir { color: var(--text-muted); font-weight: 600; }
    .mda-fs-chevron { flex: 0 0 12px; font-size: 10px; color: var(--text-muted); }
    .mda-fs-name { min-width: 0; flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .mda-fs-empty { padding: 12px; color: var(--text-muted); font-size: 12px; }

    /* ================= 欢迎页（WELCOME 空态）================= */
    .mda-welcome {
      position: absolute; inset: 0; z-index: 20;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
    }
    .mda-welcome.hidden { display: none; }
    .mda-welcome-inner { max-width: 520px; width: 90%; text-align: center; }
    .mda-welcome-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: .02em; }
    .mda-welcome-lead { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; line-height: 1.6; }
    .mda-welcome-actions { display: flex; flex-direction: column; gap: 10px; margin-bottom: 32px; }
    .mda-welcome-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 16px; font-size: 14px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg-secondary);
      color: var(--text); cursor: pointer;
    }
    .mda-welcome-btn:hover { border-color: var(--accent); color: var(--accent); }
    .mda-welcome-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .mda-welcome-btn.primary:hover { filter: brightness(1.05); color: #fff; }
    .mda-welcome-btn kbd {
      font-size: 11px; padding: 2px 6px; border-radius: 4px;
      background: rgba(0,0,0,.06); border: 1px solid var(--border-light);
    }
    [data-theme="dark"] .mda-welcome-btn kbd { background: rgba(255,255,255,.08); }
    .mda-welcome-recent { text-align: left; }
    .mda-welcome-recent-head { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
    .mda-welcome-recent-list { list-style: none; max-height: 200px; overflow: auto; }
    .mda-welcome-recent-list li {
      padding: 8px 10px; border-radius: 6px; cursor: pointer; border: 1px solid transparent;
    }
    .mda-welcome-recent-list li:hover { background: var(--sel-bg); border-color: var(--border-light); }
    .mda-welcome-recent-name { display: block; font-size: 13px; font-weight: 500; }
    .mda-welcome-recent-path { display: block; font-size: 11px; color: var(--text-muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mda-welcome-recent-empty { font-size: 12px; color: var(--text-muted); padding: 8px 0; }

    #editor-pane { flex: 0 0 380px; display: none; overflow: hidden; }
    #editor-pane.visible { display: flex; }
    #preview-pane { flex: 1 1 auto; min-width: 200px; overflow: hidden; padding: 0; background: var(--bg); display: flex; flex-direction: row; align-items: stretch; }
    #outline-host {
      position: relative; flex: 0 0 200px; display: flex; flex-direction: column;
      overflow: hidden; background: var(--bg);
      border-right: 1px solid transparent;
      transition: border-color .12s ease;
    }
    #outline-host:hover { border-right-color: var(--border-light); }
    #outline-host.collapsed { display: none; flex: 0 0 0; width: 0; min-width: 0; overflow: hidden; }
    #split-outline.mda-splitter { background: transparent; }
    #outline-host:hover + #split-outline,
    #split-outline:hover { background: var(--border-light); }
    #split-outline.mda-splitter:hover { background: var(--accent); }
    #preview-scroll {
      position: relative; flex: 1 1 auto; min-width: 0; overflow: auto; background: var(--bg);
    }
    .mda-outline-expand-rail {
      flex: 0 0 44px; display: none; flex-direction: column; align-items: center;
      padding-top: 12px; background: var(--bg); border-right: 1px solid var(--border-light);
    }
    .mda-outline-expand-rail.visible { display: flex; }
    .mda-outline-expand-tab {
      width: 32px; height: 32px; padding: 0; border-radius: 50%;
      border: 1px solid var(--border); background: var(--bg);
      box-shadow: 0 1px 6px rgba(0,0,0,.08); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); flex: 0 0 auto;
    }
    .mda-outline-expand-tab:hover {
      color: var(--accent); border-color: var(--accent);
      box-shadow: 0 2px 10px rgba(0,0,0,.12);
    }
    .mda-outline-expand-tab svg { width: 16px; height: 16px; fill: currentColor; pointer-events: none; }
    /* 与收放编辑/批注一致：外层变宽，正文 max-width 恒定 800 + 居中，避免换行重排跳动 */
    #preview-content {
      overflow: visible; padding: 16px; max-width: 800px; margin: 0 auto; width: 100%; line-height: 1.7;
      box-sizing: border-box;
    }
    #panel-pane { flex: 0 0 320px; display: flex; flex-direction: column; overflow: hidden; min-width: 240px; background: var(--bg-secondary); }
    #panel-pane.hidden { display: none; }

    /* 分栏拖拽手柄 */
    .mda-splitter { flex: 0 0 5px; cursor: col-resize; background: var(--border-light); }
    .mda-splitter:hover { background: var(--accent); }
    .mda-splitter.hidden { display: none; }

    /* ================= 源码编辑器（textarea 叠加高亮层 + 行号槽）================= */
    .mda-src-editor { flex: 1; display: flex; overflow: hidden; background: var(--bg); border-right: 1px solid var(--border); }
    .src-gutter {
      flex: 0 0 auto; width: 3.4em; padding: 12px 8px 12px 0; text-align: right;
      color: var(--gutter-text); background: var(--gutter-bg); border-right: 1px solid var(--border);
      font-family: 'Cascadia Code', Consolas, 'Courier New', 'Microsoft YaHei', monospace; font-size: 13px; line-height: 21px;
      white-space: pre; overflow: hidden; user-select: none; -webkit-user-select: none;
      font-variant-ligatures: none; font-feature-settings: "liga" 0, "calt" 0;
    }
    .src-scroll { position: relative; flex: 1; overflow: hidden; }
    .src-highlight, .src-input {
      margin: 0; border: 0; padding: 12px;
      /* 显式指定中文回退字体：textarea 与高亮层若各自挑不同 CJK 回退字体，每个汉字差一点点、
         几个字后光标就明显偏移（点行首正常、点行尾偏）。两层锁定同一中文字体即可对齐。 */
      /* 行高必须用整数像素：1.6*13=20.8px 非整数，textarea 与 <code> 逐行取整方式不同，
         滚到几百行会累积成几十像素的纵向错位（越往下越乱）。整数 px 使两层每行严格等高。 */
      font-family: 'Cascadia Code', Consolas, 'Courier New', 'Microsoft YaHei', monospace; font-size: 13px; line-height: 21px;
      white-space: pre; tab-size: 2; word-wrap: normal; letter-spacing: 0;
      /* 关闭连字：整行被拆成多个 span 后，跨 span 的连字会在高亮层断开而 textarea 不断开，
         两层字符宽度不一致导致光标错位。两层必须一致关闭。 */
      font-variant-ligatures: none; font-feature-settings: "liga" 0, "calt" 0;
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-sizing: border-box;
    }
    .src-highlight { pointer-events: none; z-index: 1; color: var(--text); background: transparent; overflow: hidden; }
    .src-find-mark {
      pointer-events: none; z-index: 1; color: transparent; background: transparent; overflow: hidden;
      margin: 0; border: 0; padding: 12px; padding-bottom: 60px; padding-right: 60px;
      font-family: 'Cascadia Code', Consolas, 'Courier New', 'Microsoft YaHei', monospace;
      font-size: 13px; line-height: 21px; white-space: pre; tab-size: 2;
      font-variant-ligatures: none; font-feature-settings: "liga" 0, "calt" 0;
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-sizing: border-box;
    }
    .src-find-mark code { font: inherit; white-space: pre; display: block; background: transparent; padding: 0; }
    .mda-find-mark { background: rgba(255, 214, 0, 0.45); border-radius: 2px; }
    .mda-find-active { background: rgba(255, 140, 0, 0.7); border-radius: 2px; }
    mark.mda-preview-find { background: rgba(255, 214, 0, 0.45); color: inherit; padding: 0 1px; border-radius: 2px; }
    mark.mda-preview-find-active { background: rgba(255, 140, 0, 0.75); color: inherit; padding: 0 1px; border-radius: 2px; }
    ::highlight(mda-anno-critical) { background-color: rgba(231, 76, 60, 0.38); }
    ::highlight(mda-anno-major) { background-color: rgba(230, 126, 34, 0.38); }
    ::highlight(mda-anno-minor) { background-color: rgba(241, 196, 15, 0.42); }
    ::highlight(mda-anno-info) { background-color: rgba(149, 165, 166, 0.35); }
    mark.mda-anno-fallback { padding: 0 1px; border-radius: 2px; color: inherit; }
    mark.mda-anno-fallback-critical { background: rgba(231, 76, 60, 0.38); }
    mark.mda-anno-fallback-major { background: rgba(230, 126, 34, 0.38); }
    mark.mda-anno-fallback-minor { background: rgba(241, 196, 15, 0.42); }
    mark.mda-anno-fallback-info { background: rgba(149, 165, 166, 0.35); }
    mark.mda-anno-flash { background: rgba(56, 139, 253, 0.45); padding: 0 1px; border-radius: 2px; }
    .anno-stale-badge { font-size: 10px; color: var(--danger); margin-left: 6px; }
    /* textarea 因横向滚动条(~17px)+末行预留，可滚动范围恒比高亮层多几十像素，滚到底部时高亮层被钳住→纵向错位。
       给高亮层加足够的底/右内边距，使其可滚动范围 ≥ textarea，同步时不再被钳住（padding 是末行之后的空白，不影响字符位置）。 */
    .src-highlight { padding-bottom: 60px; padding-right: 60px; }
    .src-highlight code { font: inherit; white-space: pre; display: block; background: transparent; padding: 0; }
    /* 围栏内 hljs 默认主题会加真实 font-weight/font-style → 改字宽导致光标错位；
       在高亮层统一归一为常规，字宽完全由 textarea 决定，再由下方 mda-hl 类按需覆盖颜色/斜体/模拟加粗。 */
    .src-highlight code, .src-highlight code * { font-weight: normal; font-style: normal; }
    /* 编辑器 Markdown 高亮：颜色 + 样式。
       加粗禁用真实 font-weight（会改变字宽 → textarea 光标错位），改用 text-shadow 横向描边模拟加粗，
       布局中性；斜体的 font-style 不改字宽，可保留。 */
    .src-highlight .mda-hl-mark { color: var(--gutter-text); }
    .src-highlight .mda-hl-heading { color: #6f42c1; text-shadow: 0.4px 0 0 currentColor; }
    .src-highlight .mda-hl-quote { color: var(--text-muted); font-style: italic; }
    .src-highlight .mda-hl-code { color: #032f62; }
    .src-highlight .mda-hl-strong { color: #0550ae; text-shadow: 0.4px 0 0 currentColor; }
    .src-highlight .mda-hl-link { color: #0969da; }
    [data-theme="dark"] .src-highlight .mda-hl-heading { color: #d2a8ff; }
    [data-theme="dark"] .src-highlight .mda-hl-code { color: #a5d6ff; }
    [data-theme="dark"] .src-highlight .mda-hl-strong { color: #79c0ff; }
    [data-theme="dark"] .src-highlight .mda-hl-link { color: #58a6ff; }
    .src-input {
      z-index: 2; resize: none; overflow: auto; background: transparent; color: transparent;
      caret-color: var(--text); outline: none;
    }
    .src-input::selection { background: rgba(56,139,253,0.35); }

    /* ================= 缩放遮罩（图片 / 流程图）================= */
    .mda-zoom {
      position: fixed; inset: 0; z-index: 4000; background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .mda-zoom-stage { transform-origin: center center; cursor: grab; }
    .mda-zoom-stage:active { cursor: grabbing; }
    .mda-zoom-stage img, .mda-zoom-stage svg { max-width: 90vw; max-height: 90vh; display: block; background: #fff; border-radius: 4px; }
    .mda-zoom-bar { position: fixed; top: 14px; right: 16px; display: flex; gap: 6px; z-index: 4002; }
    .mda-zoom-bar button {
      width: 34px; height: 34px; font-size: 18px; line-height: 1; cursor: pointer;
      color: #fff; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.45); border-radius: 6px;
    }
    .mda-zoom-bar button:hover { background: rgba(0,0,0,0.82); border-color: #fff; }
    #preview-content img { cursor: zoom-in; }
    .mda-mermaid { cursor: zoom-in; }

    .md-image-alt { display: inline-block; padding: 4px 8px; border: 1px dashed var(--img-alt-border); color: var(--text-muted); font-style: italic; font-size: 0.9em; border-radius: 4px; }
    [data-line] { cursor: pointer; }
    .mda-cursor-block { background: color-mix(in srgb, var(--accent) 12%, transparent); box-shadow: -4px 0 0 var(--accent); border-radius: 2px; }

    /* ================= Markdown 正文排版 ================= */
    #preview-content { color: var(--text); font-size: 16px; word-wrap: break-word; }
    #preview-content h1, #preview-content h2, #preview-content h3,
    #preview-content h4, #preview-content h5, #preview-content h6 {
      margin: 24px 0 16px; font-weight: 600; line-height: 1.25;
    }
    #preview-content h1:first-child,
    #preview-content h2:first-child,
    #preview-content h3:first-child { margin-top: 0; }
    #preview-content h1 { font-size: 1.9em; padding-bottom: .3em; border-bottom: 1px solid var(--border-light); }
    #preview-content h2 { font-size: 1.5em; padding-bottom: .3em; border-bottom: 1px solid var(--border-light); }
    #preview-content h3 { font-size: 1.25em; }
    #preview-content h4 { font-size: 1em; }
    #preview-content h5 { font-size: .9em; }
    #preview-content h6 { font-size: .85em; color: var(--text-muted); }
    #preview-content p { margin: 0 0 16px; }
    #preview-content ul, #preview-content ol { margin: 0 0 16px; padding-left: 2em; }
    #preview-content li { margin: .25em 0; }
    #preview-content li > ul, #preview-content li > ol { margin: .25em 0; }
    #preview-content blockquote {
      margin: 0 0 16px; padding: 0 1em; color: var(--text-muted);
      border-left: .25em solid var(--border);
    }
    #preview-content blockquote > :last-child { margin-bottom: 0; }
    #preview-content hr { height: 1px; margin: 24px 0; background: var(--border-light); border: 0; }
    #preview-content a { color: var(--link); text-decoration: none; }
    #preview-content a:hover { text-decoration: underline; }
    #preview-content strong { font-weight: 600; }
    #preview-content img { max-width: 100%; }
    #preview-content table {
      display: block; width: max-content; max-width: 100%; margin: 0 0 16px;
      overflow: auto; border-collapse: collapse;
    }
    #preview-content table th, #preview-content table td { padding: 6px 13px; border: 1px solid var(--border); }
    #preview-content table th { font-weight: 600; background: var(--bg-tertiary); }
    #preview-content table tr:nth-child(2n) td { background: var(--table-alt); }

    /* ================= 流程图 (mermaid) ================= */
    .mda-mermaid { margin: 12px 0; text-align: center; overflow-x: auto; }
    .mda-mermaid svg { max-width: 100%; height: auto; }
    .mda-mermaid-error {
      margin: 12px 0; padding: 10px 12px; border: 1px solid var(--danger);
      border-radius: 6px; color: var(--danger); background: color-mix(in srgb, var(--danger) 8%, transparent);
      font-size: 13px; white-space: pre-wrap;
    }

    /* ================= 代码块增强 ================= */
    .mda-code {
      position: relative; margin: 12px 0; border: 1px solid var(--border);
      border-radius: 6px; background: var(--code-bg); overflow: hidden; outline: none;
    }
    .mda-code:focus-within { box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 40%, transparent); }
    .mda-code-copy {
      position: absolute; top: 6px; right: 6px; z-index: 2; padding: 3px 10px;
      font-size: 12px; cursor: pointer; color: var(--text); background: var(--bg);
      border: 1px solid var(--border); border-radius: 4px; opacity: 0; transition: opacity .12s;
    }
    .mda-code:hover .mda-code-copy, .mda-code:focus-within .mda-code-copy { opacity: 1; }
    .mda-code-copy:hover { border-color: var(--accent); color: var(--accent); }
    .mda-code .mda-code-gutter {
      position: absolute; left: 0; top: 0; bottom: 0; width: 3.2em; padding: 12px 8px 12px 0;
      text-align: right; white-space: pre; user-select: none; -webkit-user-select: none;
      color: var(--gutter-text); background: var(--gutter-bg); border-right: 1px solid var(--border);
      font-family: 'Cascadia Code', Consolas, 'Courier New', monospace; font-size: 13px; line-height: 1.5;
      pointer-events: none;
    }
    .mda-code .mda-code-scroll { margin-left: 3.2em; overflow-x: auto; }
    .mda-code pre.mda-code-pre { margin: 0; padding: 12px; background: transparent; border: none; }
    .mda-code pre.mda-code-pre code {
      display: block; white-space: pre; color: var(--text);
      font-family: 'Cascadia Code', Consolas, 'Courier New', monospace;
      font-size: 13px; line-height: 1.5; background: transparent; padding: 0;
    }
    code { font-family: 'Cascadia Code', Consolas, 'Courier New', monospace; background: var(--bg-tertiary); padding: 1px 4px; border-radius: 3px; font-size: 0.92em; }
    pre code { background: transparent; padding: 0; }

    /* ================= 右键菜单 ================= */
    .mda-context-menu {
      position: fixed; z-index: 3000; min-width: 120px; background: var(--menu-bg);
      border: 1px solid var(--border); border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      padding: 4px 0; font-size: 13px;
    }
    .mda-context-menu .mda-menu-item {
      display: flex; align-items: center; justify-content: space-between; gap: 24px;
      padding: 7px 16px; cursor: pointer; color: var(--text);
    }
    .mda-context-menu .mda-menu-item:hover { background: var(--accent); color: #fff; }
    .mda-context-menu .mda-menu-item.disabled { color: var(--text-muted); pointer-events: none; opacity: 0.55; }
    .mda-context-menu .mda-menu-key { color: var(--text-muted); font-size: 12px; }
    .mda-context-menu .mda-menu-item:hover .mda-menu-key { color: #e0e8ff; }

    /* ================= 批注面板 ================= */
    .panel-head { padding: 8px; border-bottom: 1px solid var(--border); background: var(--bg); }
    .btn-primary {
      width: 100%; padding: 8px; cursor: pointer; background: var(--accent); color: #fff;
      border: none; border-radius: 4px; font-size: 14px;
    }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .filter-box { padding: 8px; border-bottom: 1px solid var(--border-light); font-size: 12px; background: var(--bg); }
    .filter-box b { color: var(--text); }
    .filter-box label { color: var(--text); }
    #anno-list { flex: 1; overflow: auto; }
    .anno-item { padding: 10px 8px; border-bottom: 1px solid var(--border-light); cursor: pointer; background: var(--bg); }
    .anno-item:nth-child(2n) { background: var(--bg-secondary); }
    .anno-item.selected { background: var(--sel-bg); }
    .anno-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .anno-content { margin-bottom: 6px; font-size: 13px; color: var(--text); }
    .anno-tags { margin-bottom: 6px; }
    .anno-tag { background: var(--tag-bg); border-radius: 3px; padding: 2px 6px; font-size: 11px; margin-right: 4px; color: var(--text); }
    .anno-actions { text-align: right; }
    .btn-mini { font-size: 11px; padding: 3px 8px; cursor: pointer; border: 1px solid var(--border); border-radius: 3px; background: var(--bg); color: var(--text); margin-right: 4px; }
    .btn-mini.danger { border-color: var(--danger); color: var(--danger); }
    .anno-empty { padding: 24px; color: var(--text-muted); text-align: center; font-size: 13px; }

    /* ================= 弹窗 ================= */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.45); display: flex; justify-content: center; align-items: center; z-index: 2000; }
    .mda-toast {
      position: fixed;
      left: 50%;
      bottom: 48px;
      transform: translateX(-50%) translateY(12px);
      padding: 10px 18px;
      background: rgba(32, 32, 32, 0.92);
      color: #fff;
      font-size: 13px;
      border-radius: 6px;
      z-index: 3000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      max-width: 80vw;
    }
    .mda-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .modal-box { background: var(--bg); color: var(--text); border-radius: 8px; padding: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.35); }
    .mda-export-busy { z-index: 2100; cursor: wait; }
    .mda-export-busy .modal-box { min-width: 260px; text-align: center; padding: 28px 32px; }
    .mda-export-busy .mda-export-spin {
      width: 28px; height: 28px; margin: 0 auto 14px; border: 3px solid var(--border);
      border-top-color: var(--accent, #0969da); border-radius: 50%;
      animation: mda-export-spin 0.8s linear infinite;
    }
    .mda-export-busy .mda-export-msg { font-size: 14px; color: var(--text); margin: 0; }
    .mda-export-busy .mda-export-hint { font-size: 12px; color: var(--text-muted); margin: 10px 0 0; }
    @keyframes mda-export-spin { to { transform: rotate(360deg); } }
    .modal-box h3 { margin: 0 0 16px; font-size: 16px; }
    .modal-box label { font-size: 12px; color: var(--text-muted); }
    .modal-box input, .modal-box textarea, .modal-box select {
      width: 100%; padding: 8px; margin-top: 4px; border: 1px solid var(--border);
      border-radius: 4px; background: var(--bg); color: var(--text); font-size: 13px;
    }
    .modal-box textarea { resize: vertical; }
    .mda-help-box { min-width: 420px; max-width: 560px; max-height: 85vh; display: flex; flex-direction: column; }
    .mda-help-title { margin: 0 0 12px; font-size: 18px; }
    .mda-help-body { overflow-y: auto; font-size: 13px; line-height: 1.65; padding-right: 4px; }
    .mda-help-body h3 { margin: 16px 0 8px; font-size: 14px; color: var(--text); }
    .mda-help-body h3:first-of-type { margin-top: 0; }
    .mda-help-lead { margin: 0 0 8px; color: var(--text-muted); }
    .mda-help-body ul { margin: 0 0 8px; padding-left: 1.4em; }
    .mda-help-body li { margin: 4px 0; }
    .mda-help-body code, .mda-help-body kbd {
      font-family: 'Cascadia Code', Consolas, monospace; font-size: 12px;
      padding: 1px 5px; border-radius: 3px; background: var(--bg-tertiary); border: 1px solid var(--border);
    }
    .mda-help-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 13px; }
    .mda-help-table td { padding: 6px 8px; border-bottom: 1px solid var(--border-light); vertical-align: top; }
    .mda-help-table td:last-child { text-align: right; white-space: nowrap; }
    .mda-help-note { margin: 12px 0 0; font-size: 12px; color: var(--text-muted); }

    /* ================= 大纲面板 ================= */
    .mda-outline-panel { font-size: 12px; display: flex; flex-direction: column; height: 100%; flex: 1; min-height: 0; overflow: hidden; }
    .mda-outline-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 10px; font-weight: 600; color: var(--text-muted);
      background: transparent; flex: 0 0 auto;
    }
    .mda-outline-toggle { border: none; background: transparent; cursor: pointer; color: var(--text-muted); padding: 2px 6px; font-size: 14px; }
    .mda-outline-toggle:hover { color: var(--accent); }
    .mda-outline-body { flex: 1 1 auto; min-height: 0; padding: 4px 0 8px; overflow: auto; }
    .mda-outline-list { list-style: none; margin: 0; padding: 0; }
    .mda-outline-link {
      display: block; width: 100%; text-align: left; border: none; background: transparent;
      padding: 3px 8px; cursor: pointer; color: var(--text); font-size: 12px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .mda-outline-link:hover { background: var(--sel-bg); color: var(--accent); }
    .mda-outline-link.active { color: var(--accent); font-weight: 600; background: transparent; }
    .mda-outline-empty { padding: 8px 12px; color: var(--text-muted); }

    /* ================= 查找替换 ================= */
    #editor-pane { position: relative; }
    .mda-find-bar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 30;
      background: var(--menu-bg); border-bottom: 1px solid var(--border);
      padding: 8px 10px; box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .mda-find-bar.hidden { display: none; }
    .mda-find-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .mda-find-row input[type="text"] {
      flex: 1; min-width: 120px; padding: 4px 8px; font-size: 13px;
      border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text);
    }
    .mda-find-count { font-size: 12px; color: var(--text-muted); min-width: 48px; }
    .mda-find-opt { font-size: 12px; color: var(--text-muted); display: inline-flex; align-items: center; gap: 4px; }
    .mda-find-bar button {
      padding: 4px 8px; font-size: 12px; cursor: pointer;
      border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text);
    }
    .mda-find-bar button:hover { border-color: var(--accent); color: var(--accent); }

    /* ================= 预览表格增强 ================= */
    #preview-content .table-wrap { overflow-x: auto; margin: 12px 0; }
    #preview-content table { border-collapse: collapse; width: 100%; font-size: 14px; }
    #preview-content th, #preview-content td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    #preview-content th { background: var(--bg-tertiary); font-weight: 600; }
    #preview-content tr:nth-child(even) td { background: var(--table-alt); }

    .modal-field { margin-bottom: 12px; }
    .modal-actions { text-align: right; margin-top: 16px; }
    .btn-ghost { padding: 8px 20px; margin-right: 8px; cursor: pointer; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text); font-size: 13px; }
    .btn-ok { padding: 8px 20px; cursor: pointer; background: var(--accent); color: #fff; border: none; border-radius: 4px; font-size: 13px; }

    /* ================= highlight.js 主题（亮/暗） ================= */
    .hljs-comment, .hljs-quote { color: #6a737d; font-style: italic; }
    .hljs-keyword, .hljs-selector-tag, .hljs-built_in, .hljs-name, .hljs-tag { color: #d73a49; }
    .hljs-string, .hljs-doctag, .hljs-template-tag, .hljs-template-variable, .hljs-regexp, .hljs-addition { color: #032f62; }
    .hljs-title, .hljs-title.class_, .hljs-title.function_, .hljs-section, .hljs-selector-id { color: #6f42c1; }
    .hljs-number, .hljs-literal, .hljs-variable, .hljs-attr, .hljs-attribute, .hljs-meta { color: #005cc5; }
    .hljs-type, .hljs-class .hljs-title, .hljs-symbol, .hljs-bullet, .hljs-link { color: #e36209; }
    .hljs-emphasis { font-style: italic; }
    .hljs-strong { font-weight: bold; }
    .hljs-deletion { color: #b31d28; background: #ffeef0; }

    [data-theme="dark"] .hljs-comment, [data-theme="dark"] .hljs-quote { color: #8b949e; }
    [data-theme="dark"] .hljs-keyword, [data-theme="dark"] .hljs-selector-tag, [data-theme="dark"] .hljs-built_in, [data-theme="dark"] .hljs-name, [data-theme="dark"] .hljs-tag { color: #ff7b72; }
    [data-theme="dark"] .hljs-string, [data-theme="dark"] .hljs-doctag, [data-theme="dark"] .hljs-template-tag, [data-theme="dark"] .hljs-template-variable, [data-theme="dark"] .hljs-regexp, [data-theme="dark"] .hljs-addition { color: #a5d6ff; }
    [data-theme="dark"] .hljs-title, [data-theme="dark"] .hljs-title.class_, [data-theme="dark"] .hljs-title.function_, [data-theme="dark"] .hljs-section, [data-theme="dark"] .hljs-selector-id { color: #d2a8ff; }
    [data-theme="dark"] .hljs-number, [data-theme="dark"] .hljs-literal, [data-theme="dark"] .hljs-variable, [data-theme="dark"] .hljs-attr, [data-theme="dark"] .hljs-attribute, [data-theme="dark"] .hljs-meta { color: #79c0ff; }
    [data-theme="dark"] .hljs-type, [data-theme="dark"] .hljs-class .hljs-title, [data-theme="dark"] .hljs-symbol, [data-theme="dark"] .hljs-bullet, [data-theme="dark"] .hljs-link { color: #ffa657; }
    [data-theme="dark"] .hljs-deletion { color: #ffdcd7; background: #67060c; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="./editor-assist.js"></script>

  <script src="./anchor-highlights.js"></script>
  <script src="./app.js"></script>
</body>
